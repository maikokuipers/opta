<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WK 2026 Stats Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22252f;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #8b8d98;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --home-color: #3b82f6;
      --away-color: #f97316;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- Header ---- */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 0.5rem;
    }

    .header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .header h1 span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .last-updated {
      font-size: 0.7rem;
      color: var(--text-muted);
      display: none;
    }

    .btn {
      padding: 0.4rem 0.7rem;
      border: none;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    .btn-secondary {
      background: var(--surface-hover);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { background: var(--border); }

    .btn-live {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .btn-live:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn .spinner {
      display: none;
      width: 12px;
      height: 12px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .btn.loading .spinner { display: inline-block; }
    .btn.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Teams filter bar (collapsible) ---- */
    .teams-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem;
    }

    .teams-bar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .teams-bar-header .label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .chevron {
      display: inline-block;
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid var(--text-muted);
      transition: transform 0.2s ease;
    }

    .teams-bar.collapsed .chevron {
      transform: rotate(-90deg);
    }

    .teams-bar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .teams-bar-actions button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.65rem;
      cursor: pointer;
      padding: 0.15rem 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .teams-bar-actions button:hover { color: var(--text); }

    .teams-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin-top: 0.4rem;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
      max-height: 500px;
      opacity: 1;
    }

    .teams-bar.collapsed .teams-grid {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
    }

    .team-filter {
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s ease;
      border: 1.5px solid transparent;
      user-select: none;
      line-height: 1.5;
    }

    .team-filter.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .team-filter.inactive {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }

    .team-filter.inactive:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .team-filter.active:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .filter-count {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* ---- Group filter ---- */
    .group-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin-top: 0.35rem;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
      max-height: 100px;
      opacity: 1;
    }

    .teams-bar.collapsed .group-filters {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
    }

    .group-pill {
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      font-size: 0.6rem;
      font-weight: 700;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      transition: all 0.12s ease;
      user-select: none;
      letter-spacing: 0.03em;
    }

    .group-pill:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .group-pill.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .group-pill.active:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* ---- Match filters toolbar ---- */
    .match-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .match-filters {
      display: flex;
      gap: 0.35rem;
    }

    .filter-pill {
      padding: 0.25rem 0.65rem;
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      transition: all 0.12s ease;
      user-select: none;
    }

    .filter-pill:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .filter-pill.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .filter-pill.active:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* ---- Content ---- */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* ---- Match card ---- */
    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      gap: 0.5rem;
    }

    .match-teams {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      min-width: 0;
    }

    .match-teams .home { color: var(--home-color); }
    .match-teams .away { color: var(--away-color); }

    .match-teams .vs {
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 400;
      flex-shrink: 0;
    }

    .match-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-shrink: 0;
    }

    .match-date {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .match-score {
      font-size: 1.1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .match-status {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    .status-live {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
      animation: pulse 2s infinite;
    }

    .status-finished {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }

    .status-upcoming {
      background: rgba(234, 179, 8, 0.15);
      color: var(--yellow);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ---- Stats ---- */
    .stats-table { width: 100%; }

    .stat-block {
      border-bottom: 1px solid var(--border);
    }

    .stat-block:last-child { border-bottom: none; }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0.5rem 1rem 0.2rem;
    }

    .stat-value {
      font-size: 1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .stat-value.home { text-align: right; color: var(--home-color); }
    .stat-value.away { text-align: left; color: var(--away-color); }

    .stat-value.higher::after {
      content: "";
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--green);
      border-radius: 50%;
      margin-left: 4px;
      vertical-align: middle;
    }

    .stat-label {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      padding: 0 0.5rem;
      white-space: nowrap;
    }

    /* ---- Player breakdown ---- */
    .player-breakdown {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 1rem;
      padding: 0.15rem 1rem 0.5rem;
    }

    .player-list {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .player-list.home { align-items: flex-end; }
    .player-list.away { align-items: flex-start; }

    .player-entry {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.65rem;
      line-height: 1;
    }

    .player-list.home .player-entry { flex-direction: row-reverse; }

    .player-name {
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }

    .player-bar-wrap {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      flex-shrink: 0;
    }

    .player-list.home .player-bar-wrap { flex-direction: row-reverse; }

    .player-bar {
      height: 5px;
      border-radius: 3px;
      min-width: 3px;
    }

    .player-list.home .player-bar { background: var(--home-color); }
    .player-list.away .player-bar { background: var(--away-color); }

    .player-val {
      font-weight: 700;
      font-size: 0.65rem;
      font-variant-numeric: tabular-nums;
      min-width: 0.7rem;
    }

    .player-list.home .player-val { color: var(--home-color); text-align: left; }
    .player-list.away .player-val { color: var(--away-color); text-align: right; }

    /* ---- Empty / No results ---- */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .empty-state h2 {
      font-size: 1rem;
      margin-bottom: 0.4rem;
      color: var(--text);
    }

    .empty-state p {
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .no-results {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      right: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
      text-align: center;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); }
    .toast.error { border-color: var(--red); }

    /* ---- Legend ---- */
    .legend {
      display: flex;
      gap: 1rem;
      padding: 0 0.25rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .legend-dot.home { background: var(--home-color); }
    .legend-dot.away { background: var(--away-color); }
    .legend-dot.higher { background: var(--green); }

    /* ============================================
       Desktop (>= 640px)
       ============================================ */
    @media (min-width: 640px) {
      .header {
        padding: 1rem 2rem;
      }

      .header h1 { font-size: 1.25rem; }

      .last-updated { display: inline; }

      .btn {
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
      }

      .teams-bar { padding: 0.6rem 2rem; }

      .teams-grid { gap: 0.35rem; max-height: 600px; }

      .team-filter {
        padding: 0.2rem 0.6rem;
        font-size: 0.7rem;
      }

      .filter-pill {
        padding: 0.3rem 0.75rem;
        font-size: 0.7rem;
      }

      .content { padding: 2rem; }

      .match-header { padding: 1rem 1.25rem; }

      .match-teams {
        font-size: 1rem;
        gap: 0.75rem;
      }

      .match-score { font-size: 1.25rem; }

      .stat-row { padding: 0.65rem 1.25rem 0.25rem; }

      .stat-value { font-size: 1.1rem; }

      .stat-label { font-size: 0.8rem; padding: 0 1rem; }

      .player-breakdown {
        gap: 0 2rem;
        padding: 0.25rem 1.25rem 0.6rem;
      }

      .player-entry { font-size: 0.75rem; }
      .player-name { max-width: 180px; }
      .player-val { font-size: 0.75rem; }

      .toast {
        left: auto;
        right: 2rem;
        bottom: 2rem;
        max-width: 350px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1><span>WK 2026</span> Stats</h1>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated">Laden...</span>
      <button class="btn btn-live" id="btnLive" onclick="refreshLive()">
        <span class="spinner"></span>
        <span class="btn-label">Live</span>
      </button>
      <button class="btn btn-secondary" id="btnRefresh" onclick="forceRefresh()">
        <span class="spinner"></span>
        <span class="btn-label">Alles</span>
      </button>
    </div>
  </div>

  <div class="teams-bar collapsed" id="teamsBar">
    <div class="teams-bar-header" onclick="toggleTeamsBar(event)">
      <span class="label"><span class="chevron"></span> Teams <span class="filter-count" id="filterCount"></span></span>
      <div class="teams-bar-right">
        <div class="teams-bar-actions" onclick="event.stopPropagation()">
          <button onclick="selectAllTeams()">Alles aan</button>
          <button onclick="deselectAllTeams()">Alles uit</button>
        </div>
      </div>
    </div>
    <div class="group-filters" id="groupFilters"></div>
    <div class="teams-grid" id="teamsGrid"></div>
  </div>

  <div class="content">
    <div class="match-toolbar">
      <div class="match-filters">
        <span class="filter-pill active" id="filterAll" onclick="setDateFilter('all')">Alle</span>
        <span class="filter-pill" id="filterNow" onclick="setDateFilter('now')">Vandaag/Morgen</span>
        <span class="filter-pill" id="filterLive" onclick="setDateFilter('live')">Live</span>
      </div>
      <div class="legend">
        <div class="legend-item"><span class="legend-dot home"></span> Thuis</div>
        <div class="legend-item"><span class="legend-dot away"></span> Uit</div>
        <div class="legend-item"><span class="legend-dot higher"></span> Meeste</div>
      </div>
    </div>
    <div id="matchList"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "opta-wk-followed-teams";
    const STORAGE_KEY_COLLAPSED = "opta-wk-teams-collapsed";

    let appConfig = null;
    let allMatches = [];
    let activeTeams = new Set();
    let dateFilter = "all"; // "all" | "today" | "live"
    let hasHashOverride = false;

    // ---- URL Hash (shareable filters) ----

    function parseHash() {
      const hash = location.hash.replace(/^#/, "");
      if (!hash) return null;
      const params = new URLSearchParams(hash);
      const result = {};
      if (params.has("teams")) {
        result.teams = params.get("teams").split(",").map(t => decodeURIComponent(t.trim())).filter(Boolean);
      }
      if (params.has("date")) {
        const d = params.get("date");
        if (["all", "now", "live"].includes(d)) result.date = d;
      }
      return result.teams || result.date ? result : null;
    }

    function updateHash() {
      const parts = [];
      // Only encode teams if not the full default set
      if (appConfig) {
        const defaultSet = new Set(appConfig.defaultFollowedTeams);
        const isDefault = activeTeams.size === defaultSet.size &&
          [...activeTeams].every(t => defaultSet.has(t));
        if (!isDefault) {
          parts.push("teams=" + [...activeTeams].map(t => encodeURIComponent(t)).join(","));
        }
      }
      if (dateFilter !== "all") {
        parts.push("date=" + dateFilter);
      }
      const newHash = parts.length > 0 ? "#" + parts.join("&") : "";
      if (location.hash !== newHash) {
        history.replaceState(null, "", newHash || location.pathname);
      }
    }

    // ---- LocalStorage ----

    function loadActiveTeams(defaultTeams) {
      // URL hash takes priority
      const hashData = parseHash();
      if (hashData && hashData.teams) {
        hasHashOverride = true;
        return new Set(hashData.teams);
      }
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed)) return new Set(parsed);
        } catch {}
      }
      return new Set(defaultTeams);
    }

    function loadDateFilter() {
      const hashData = parseHash();
      if (hashData && hashData.date) return hashData.date;
      return "all";
    }

    function saveActiveTeams() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...activeTeams]));
      updateHash();
    }

    // ---- Teams bar collapse ----

    function toggleTeamsBar(e) {
      const bar = document.getElementById("teamsBar");
      bar.classList.toggle("collapsed");
      localStorage.setItem(STORAGE_KEY_COLLAPSED, bar.classList.contains("collapsed") ? "1" : "0");
    }

    function restoreTeamsBarState() {
      const collapsed = localStorage.getItem(STORAGE_KEY_COLLAPSED);
      const bar = document.getElementById("teamsBar");
      if (collapsed === "0") {
        bar.classList.remove("collapsed");
      } else {
        bar.classList.add("collapsed");
      }
    }

    // ---- Init ----

    document.addEventListener("DOMContentLoaded", () => {
      restoreTeamsBarState();
      fetchStats();
    });

    // Handle back/forward navigation
    window.addEventListener("hashchange", () => {
      const hashData = parseHash();
      if (hashData) {
        if (hashData.teams) {
          activeTeams = new Set(hashData.teams);
          if (appConfig) {
            renderTeamFilters(appConfig.allTeams);
            updateGroupPills();
          }
        }
        if (hashData.date) {
          dateFilter = hashData.date;
          updateDateFilterUI();
        }
        renderFilteredMatches();
      }
    });

    async function fetchStats() {
      try {
        const res = await fetch("/api/stats");
        const data = await res.json();
        appConfig = data.config;
        allMatches = data.matches || [];

        activeTeams = loadActiveTeams(appConfig.defaultFollowedTeams);
        dateFilter = loadDateFilter();

        renderGroupFilters();
        renderTeamFilters(appConfig.allTeams);
        updateDateFilterUI();
        renderFilteredMatches();
        updateHash();

        if (data.lastUpdated) {
          const date = new Date(data.lastUpdated);
          document.getElementById("lastUpdated").textContent =
            date.toLocaleString("nl-NL", { hour: "2-digit", minute: "2-digit" });
        }
      } catch (e) {
        console.error("Failed to fetch stats:", e);
      }
    }

    // ---- Team Filters ----

    function renderTeamFilters(teams) {
      const grid = document.getElementById("teamsGrid");
      grid.innerHTML = "";
      teams.forEach((team) => {
        const tag = document.createElement("span");
        tag.className = `team-filter ${activeTeams.has(team) ? "active" : "inactive"}`;
        tag.textContent = team;
        tag.onclick = () => toggleTeam(team, tag);
        grid.appendChild(tag);
      });
      updateFilterCount();
      updateGroupPills();
    }

    function renderGroupFilters() {
      if (!appConfig || !appConfig.groups) return;
      const container = document.getElementById("groupFilters");
      container.innerHTML = "";
      for (const letter of Object.keys(appConfig.groups).sort()) {
        const pill = document.createElement("span");
        pill.className = "group-pill";
        pill.textContent = letter;
        pill.id = `group-${letter}`;
        pill.onclick = () => toggleGroup(letter);
        container.appendChild(pill);
      }
      updateGroupPills();
    }

    function toggleGroup(letter) {
      if (!appConfig || !appConfig.groups) return;
      const groupTeams = appConfig.groups[letter] || [];
      const allActive = groupTeams.every(t => activeTeams.has(t));
      if (allActive) {
        // Deselect all in group
        groupTeams.forEach(t => activeTeams.delete(t));
      } else {
        // Select all in group
        groupTeams.forEach(t => activeTeams.add(t));
      }
      saveActiveTeams();
      renderTeamFilters(appConfig.allTeams);
      renderFilteredMatches();
    }

    function updateGroupPills() {
      if (!appConfig || !appConfig.groups) return;
      for (const [letter, teams] of Object.entries(appConfig.groups)) {
        const pill = document.getElementById(`group-${letter}`);
        if (!pill) continue;
        const allActive = teams.every(t => activeTeams.has(t));
        pill.className = `group-pill ${allActive ? "active" : ""}`;
      }
    }

    function toggleTeam(team, el) {
      if (activeTeams.has(team)) {
        activeTeams.delete(team);
        el.className = "team-filter inactive";
      } else {
        activeTeams.add(team);
        el.className = "team-filter active";
      }
      saveActiveTeams();
      updateFilterCount();
      updateGroupPills();
      renderFilteredMatches();
    }

    function selectAllTeams() {
      if (!appConfig) return;
      activeTeams = new Set(appConfig.allTeams);
      saveActiveTeams();
      renderTeamFilters(appConfig.allTeams);
      renderFilteredMatches();
    }

    function deselectAllTeams() {
      activeTeams = new Set();
      saveActiveTeams();
      if (appConfig) renderTeamFilters(appConfig.allTeams);
      renderFilteredMatches();
    }

    function updateFilterCount() {
      const el = document.getElementById("filterCount");
      if (appConfig) el.textContent = `(${activeTeams.size}/${appConfig.allTeams.length})`;
    }

    // ---- Date Filter ----

    function setDateFilter(filter) {
      dateFilter = filter;
      updateDateFilterUI();
      updateHash();
      renderFilteredMatches();
    }

    function updateDateFilterUI() {
      document.querySelectorAll(".filter-pill").forEach((el) => el.classList.remove("active"));
      document.getElementById(
        dateFilter === "now" ? "filterNow" : dateFilter === "live" ? "filterLive" : "filterAll"
      ).classList.add("active");
    }

    function getDateString(daysFromNow) {
      const d = new Date();
      d.setDate(d.getDate() + daysFromNow);
      return d.toLocaleDateString("en-GB", {
        day: "numeric", month: "short", year: "numeric"
      });
    }

    function matchPassesDateFilter(match) {
      if (dateFilter === "all") return true;
      if (dateFilter === "live") {
        return match.status.toLowerCase().includes("live");
      }
      // "now" = today + tomorrow
      const today = getDateString(0);
      const tomorrow = getDateString(1);
      return match.date === today || match.date === tomorrow;
    }

    // ---- Match Rendering ----

    function matchInvolvesActiveTeam(match) {
      if (activeTeams.size === 0) return false;
      return activeTeams.has(match.homeTeam.teamName) || activeTeams.has(match.awayTeam.teamName);
    }

    function renderFilteredMatches() {
      const filtered = allMatches
        .filter(matchInvolvesActiveTeam)
        .filter(matchPassesDateFilter);
      renderMatches(filtered, appConfig);
    }

    function renderMatches(matches, config) {
      const list = document.getElementById("matchList");

      if (!allMatches || allMatches.length === 0) {
        list.innerHTML = `<div class="empty-state"><h2>Data wordt geladen...</h2>
          <p>Eerste keer laden kan even duren.</p></div>`;
        return;
      }

      if (matches.length === 0) {
        const msg = dateFilter === "live"
          ? "Geen live wedstrijden op dit moment."
          : dateFilter === "now"
          ? "Geen wedstrijden vandaag/morgen voor geselecteerde teams."
          : "Geen wedstrijden voor geselecteerde teams.<br>Selecteer teams of klik \"Alles aan\".";
        list.innerHTML = `<div class="no-results">${msg}</div>`;
        return;
      }

      list.innerHTML = matches.map((match) => {
        const statsHtml = config.enabledStats
          .map((statType) => {
            const label = config.statLabelsNL[statType] || config.statLabels[statType] || statType;
            const homeVal = match.homeTeam.stats[statType] || "-";
            const awayVal = match.awayTeam.stats[statType] || "-";
            const homeNum = parseInt(homeVal) || 0;
            const awayNum = parseInt(awayVal) || 0;
            const homeHigher = homeNum > awayNum ? "higher" : "";
            const awayHigher = awayNum > homeNum ? "higher" : "";

            const homePlayers = (match.homeTeam.players && match.homeTeam.players[statType]) || [];
            const awayPlayers = (match.awayTeam.players && match.awayTeam.players[statType]) || [];
            const hasPlayers = homePlayers.length > 0 || awayPlayers.length > 0;

            const allVals = [...homePlayers, ...awayPlayers].map((p) => p.value);
            const maxVal = Math.max(...allVals, 1);

            function renderPlayerList(players, side) {
              if (!players.length) return `<div class="player-list ${side}"></div>`;
              return `<div class="player-list ${side}">${players.map((p) => {
                const bw = Math.max(Math.round((p.value / maxVal) * 50), 3);
                return `<div class="player-entry">
                  <span class="player-name">${p.name}</span>
                  <span class="player-bar-wrap">
                    <span class="player-bar" style="width:${bw}px"></span>
                    <span class="player-val">${p.value}</span>
                  </span>
                </div>`;
              }).join("")}</div>`;
            }

            return `<div class="stat-block">
              <div class="stat-row">
                <div class="stat-value home ${homeHigher}">${homeVal}</div>
                <div class="stat-label">${label}</div>
                <div class="stat-value away ${awayHigher}">${awayVal}</div>
              </div>
              ${hasPlayers ? `<div class="player-breakdown">
                ${renderPlayerList(homePlayers, 'home')}
                ${renderPlayerList(awayPlayers, 'away')}
              </div>` : ''}
            </div>`;
          }).join("");

        const sl = match.status.toLowerCase();
        const statusClass = sl.includes("live") ? "status-live"
          : (sl.includes("ft") || sl.includes("finish")) ? "status-finished"
          : "status-upcoming";

        return `<div class="match-card">
          <div class="match-header">
            <div class="match-teams">
              <span class="home">${match.homeTeam.teamName}</span>
              <span class="vs">vs</span>
              <span class="away">${match.awayTeam.teamName}</span>
            </div>
            <div class="match-meta">
              ${match.date ? `<span class="match-date">${match.date}</span>` : ''}
              <span class="match-score">${match.score || "-"}</span>
              <span class="match-status ${statusClass}">${match.status}</span>
            </div>
          </div>
          <div class="stats-table">${statsHtml}</div>
        </div>`;
      }).join("");
    }

    // ---- Actions ----

    async function refreshLive() {
      const btn = document.getElementById("btnLive");
      btn.classList.add("loading");
      btn.disabled = true;
      try {
        const res = await fetch("/api/refresh-live", { method: "POST" });
        const data = await res.json();
        if (data.success) {
          showToast(data.liveCount > 0
            ? `${data.liveCount} live wedstrijden ververst`
            : "Geen live wedstrijden op dit moment", "success");
          await fetchStats();
        } else {
          showToast(`Fout: ${data.error}`, "error");
        }
      } catch (e) {
        showToast(`Fout: ${e.message}`, "error");
      } finally {
        btn.classList.remove("loading");
        btn.disabled = false;
      }
    }

    async function forceRefresh() {
      const btn = document.getElementById("btnRefresh");
      btn.classList.add("loading");
      btn.disabled = true;
      try {
        const res = await fetch("/api/refresh", { method: "POST" });
        const data = await res.json();
        if (data.success) {
          showToast(`${data.matchCount} wedstrijden ververst`, "success");
          await fetchStats();
        } else {
          showToast(`Fout: ${data.error}`, "error");
        }
      } catch (e) {
        showToast(`Fout: ${e.message}`, "error");
      } finally {
        btn.classList.remove("loading");
        btn.disabled = false;
      }
    }

    function showToast(message, type = "success") {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove("show"), 3000);
    }
  </script>
</body>
</html>
