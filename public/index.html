<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WK 2026 Stats Dashboard</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22252f;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #8b8d98;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --home-color: #3b82f6;
      --away-color: #f97316;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .last-updated {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--surface-hover);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .btn.loading .spinner {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Teams filter bar */
    .teams-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 2rem;
    }

    .teams-bar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .teams-bar-header .label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .teams-bar-actions {
      display: flex;
      gap: 0.75rem;
    }

    .teams-bar-actions button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0.15rem 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .teams-bar-actions button:hover {
      color: var(--text);
    }

    .teams-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .team-filter {
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s ease;
      border: 1.5px solid transparent;
      user-select: none;
      line-height: 1.5;
    }

    .team-filter.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .team-filter.inactive {
      background: transparent;
      color: var(--text-muted);
      border-color: var(--border);
    }

    .team-filter.inactive:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .team-filter.active:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .filter-count {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-left: 0.25rem;
    }

    /* Content */
    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Match card */
    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 1.25rem;
      overflow: hidden;
      transition: border-color 0.15s ease;
    }

    .match-card:hover {
      border-color: var(--accent);
    }

    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .match-teams {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
    }

    .match-teams .home {
      color: var(--home-color);
    }

    .match-teams .away {
      color: var(--away-color);
    }

    .match-teams .vs {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 400;
    }

    .match-score {
      font-size: 1.25rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .match-meta {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .match-date {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .match-status {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    .status-live {
      background: rgba(239, 68, 68, 0.15);
      color: var(--red);
      animation: pulse 2s infinite;
    }

    .status-finished {
      background: rgba(34, 197, 94, 0.15);
      color: var(--green);
    }

    .status-upcoming {
      background: rgba(234, 179, 8, 0.15);
      color: var(--yellow);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Stats table */
    .stats-table {
      width: 100%;
    }

    .stat-block {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s ease;
    }

    .stat-block:last-child {
      border-bottom: none;
    }

    .stat-block:hover {
      background: var(--surface-hover);
    }

    .stat-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0.65rem 1.25rem 0.25rem;
    }

    .stat-players-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      padding: 0 1.25rem 0.5rem;
      gap: 0;
    }

    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 3rem;
    }

    .stat-value.home {
      text-align: right;
      color: var(--home-color);
    }

    .stat-value.away {
      text-align: left;
      color: var(--away-color);
    }

    .stat-value.higher {
      position: relative;
    }

    .stat-value.higher::after {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
    }

    .stat-label {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 0 1rem;
      white-space: nowrap;
    }

    /* Player breakdown */
    .player-breakdown {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 2rem;
      padding: 0.25rem 1.25rem 0.6rem;
    }

    .player-list {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .player-list.home {
      align-items: flex-end;
    }

    .player-list.away {
      align-items: flex-start;
    }

    .player-entry {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      line-height: 1;
    }

    .player-list.home .player-entry {
      flex-direction: row-reverse;
    }

    .player-name {
      color: var(--text-muted);
      white-space: nowrap;
    }

    .player-bar-wrap {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .player-list.home .player-bar-wrap {
      flex-direction: row-reverse;
    }

    .player-bar {
      height: 6px;
      border-radius: 3px;
      min-width: 4px;
    }

    .player-list.home .player-bar {
      background: var(--home-color);
    }

    .player-list.away .player-bar {
      background: var(--away-color);
    }

    .player-val {
      font-weight: 700;
      font-size: 0.75rem;
      font-variant-numeric: tabular-nums;
      min-width: 0.8rem;
    }

    .player-list.home .player-val {
      color: var(--home-color);
      text-align: left;
    }

    .player-list.away .player-val {
      color: var(--away-color);
      text-align: right;
    }

    /* Add match form */
    .add-match {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .add-match h3 {
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
      color: var(--text-muted);
    }

    .add-match-form {
      display: flex;
      gap: 0.5rem;
    }

    .add-match-form input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
    }

    .add-match-form input::placeholder {
      color: var(--text-muted);
    }

    .add-match-form input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state h2 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .empty-state p {
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    /* Toast notifications */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
      font-size: 0.85rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success {
      border-color: var(--green);
    }

    .toast.error {
      border-color: var(--red);
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 1.5rem;
      padding: 0 2rem;
      margin-bottom: 0.5rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .legend-dot.home { background: var(--home-color); }
    .legend-dot.away { background: var(--away-color); }
    .legend-dot.higher { background: var(--green); }

    /* No results */
    .no-results {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1><span>WK 2026</span> Stats Dashboard</h1>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated">Nog geen data</span>
      <button class="btn btn-secondary" id="btnScrapeMatch" onclick="showAddMatch()">
        + Wedstrijd toevoegen
      </button>
      <button class="btn btn-primary" id="btnScrape" onclick="scrapeAll()">
        <span class="spinner"></span>
        Ververs alles
      </button>
    </div>
  </div>

  <div class="teams-bar" id="teamsBar">
    <div class="teams-bar-header">
      <span class="label">Filter teams: <span class="filter-count" id="filterCount"></span></span>
      <div class="teams-bar-actions">
        <button onclick="selectAllTeams()">Alles aan</button>
        <button onclick="deselectAllTeams()">Alles uit</button>
      </div>
    </div>
    <div class="teams-grid" id="teamsGrid"></div>
  </div>

  <div class="content">
    <div class="legend">
      <div class="legend-item">
        <span class="legend-dot home"></span> Thuisteam
      </div>
      <div class="legend-item">
        <span class="legend-dot away"></span> Uitteam
      </div>
      <div class="legend-item">
        <span class="legend-dot higher"></span> Hoogste waarde
      </div>
    </div>

    <div id="addMatchSection" style="display:none" class="add-match">
      <h3>Voeg een specifieke wedstrijd toe via Opta URL</h3>
      <div class="add-match-form">
        <input type="text" id="matchUrlInput"
          placeholder="https://optaplayerstats.statsperform.com/en_GB/soccer/.../match/...">
        <button class="btn btn-primary" id="btnAddMatch" onclick="scrapeMatch()">
          <span class="spinner"></span>
          Ophalen
        </button>
      </div>
    </div>

    <div id="matchList"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "opta-wk-followed-teams";

    let appConfig = null;
    let allMatches = [];
    let activeTeams = new Set();

    // ---- LocalStorage ----

    function loadActiveTeams(defaultTeams) {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed)) {
            return new Set(parsed);
          }
        } catch {}
      }
      return new Set(defaultTeams);
    }

    function saveActiveTeams() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...activeTeams]));
    }

    // ---- Init ----

    document.addEventListener("DOMContentLoaded", fetchStats);

    async function fetchStats() {
      try {
        const res = await fetch("/api/stats");
        const data = await res.json();
        appConfig = data.config;
        allMatches = data.matches || [];

        // Laad actieve teams uit localStorage, fallback naar defaults
        activeTeams = loadActiveTeams(appConfig.defaultFollowedTeams);

        renderTeamFilters(appConfig.allTeams);
        renderFilteredMatches();

        if (data.lastUpdated) {
          const date = new Date(data.lastUpdated);
          document.getElementById("lastUpdated").textContent =
            `Laatst bijgewerkt: ${date.toLocaleString("nl-NL")}`;
        }
      } catch (e) {
        console.error("Failed to fetch stats:", e);
      }
    }

    // ---- Team Filters ----

    function renderTeamFilters(teams) {
      const grid = document.getElementById("teamsGrid");
      grid.innerHTML = "";

      teams.forEach((team) => {
        const tag = document.createElement("span");
        tag.className = `team-filter ${activeTeams.has(team) ? "active" : "inactive"}`;
        tag.textContent = team;
        tag.onclick = () => toggleTeam(team, tag);
        grid.appendChild(tag);
      });

      updateFilterCount();
    }

    function toggleTeam(team, element) {
      if (activeTeams.has(team)) {
        activeTeams.delete(team);
        element.className = "team-filter inactive";
      } else {
        activeTeams.add(team);
        element.className = "team-filter active";
      }
      saveActiveTeams();
      updateFilterCount();
      renderFilteredMatches();
    }

    function selectAllTeams() {
      if (!appConfig) return;
      activeTeams = new Set(appConfig.allTeams);
      saveActiveTeams();
      renderTeamFilters(appConfig.allTeams);
      renderFilteredMatches();
    }

    function deselectAllTeams() {
      activeTeams = new Set();
      saveActiveTeams();
      if (appConfig) renderTeamFilters(appConfig.allTeams);
      renderFilteredMatches();
    }

    function updateFilterCount() {
      const el = document.getElementById("filterCount");
      if (appConfig) {
        el.textContent = `(${activeTeams.size}/${appConfig.allTeams.length})`;
      }
    }

    // ---- Match Rendering ----

    function matchInvolvesActiveTeam(match) {
      if (activeTeams.size === 0) return false;
      const home = match.homeTeam.teamName;
      const away = match.awayTeam.teamName;
      return activeTeams.has(home) || activeTeams.has(away);
    }

    function renderFilteredMatches() {
      const filtered = allMatches.filter(matchInvolvesActiveTeam);
      renderMatches(filtered, appConfig);
    }

    function renderMatches(matches, config) {
      const list = document.getElementById("matchList");

      if (!allMatches || allMatches.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <h2>Nog geen wedstrijddata</h2>
            <p>
              Klik op "Ververs alles" om wedstrijden van het WK 2026 op te halen,<br>
              of voeg een specifieke wedstrijd toe via de URL.
            </p>
            <button class="btn btn-primary" onclick="scrapeAll()">
              <span class="spinner"></span>
              Start eerste scrape
            </button>
          </div>
        `;
        return;
      }

      if (matches.length === 0) {
        list.innerHTML = `
          <div class="no-results">
            Geen wedstrijden voor de geselecteerde teams.<br>
            Selecteer andere teams of klik "Alles aan".
          </div>
        `;
        return;
      }

      list.innerHTML = matches.map((match) => {
        const statsHtml = config.enabledStats
          .map((statType) => {
            const label = config.statLabelsNL[statType] || config.statLabels[statType] || statType;
            const homeVal = match.homeTeam.stats[statType] || "-";
            const awayVal = match.awayTeam.stats[statType] || "-";

            const homeNum = parseInt(homeVal) || 0;
            const awayNum = parseInt(awayVal) || 0;
            const homeHigher = homeNum > awayNum ? "higher" : "";
            const awayHigher = awayNum > homeNum ? "higher" : "";

            // Speler breakdown
            const homePlayers = (match.homeTeam.players && match.homeTeam.players[statType]) || [];
            const awayPlayers = (match.awayTeam.players && match.awayTeam.players[statType]) || [];
            const hasPlayers = homePlayers.length > 0 || awayPlayers.length > 0;

            // Bereken max waarde voor bar-breedte schalings
            const allVals = [...homePlayers, ...awayPlayers].map((p) => p.value);
            const maxVal = Math.max(...allVals, 1);

            function renderPlayerList(players, side) {
              if (players.length === 0) return '<div class="player-list ' + side + '"></div>';
              return `<div class="player-list ${side}">
                ${players.map((p) => {
                  const barWidth = Math.max(Math.round((p.value / maxVal) * 60), 4);
                  return `<div class="player-entry">
                    <span class="player-name">${p.name}</span>
                    <span class="player-bar-wrap">
                      <span class="player-bar" style="width:${barWidth}px"></span>
                      <span class="player-val">${p.value}</span>
                    </span>
                  </div>`;
                }).join("")}
              </div>`;
            }

            return `
              <div class="stat-block">
                <div class="stat-row">
                  <div class="stat-value home ${homeHigher}">${homeVal}</div>
                  <div class="stat-label">${label}</div>
                  <div class="stat-value away ${awayHigher}">${awayVal}</div>
                </div>
                ${hasPlayers ? `
                <div class="player-breakdown">
                  ${renderPlayerList(homePlayers, 'home')}
                  ${renderPlayerList(awayPlayers, 'away')}
                </div>` : ''}
              </div>
            `;
          })
          .join("");

        const statusClass =
          match.status.toLowerCase().includes("live") ? "status-live" :
          match.status.toLowerCase().includes("finish") || match.status.toLowerCase().includes("ft") ? "status-finished" :
          "status-upcoming";

        return `
          <div class="match-card">
            <div class="match-header">
              <div class="match-teams">
                <span class="home">${match.homeTeam.teamName || "Team A"}</span>
                <span class="vs">vs</span>
                <span class="away">${match.awayTeam.teamName || "Team B"}</span>
              </div>
              <div class="match-meta">
                ${match.date ? `<span class="match-date">${match.date}</span>` : ''}
                <span class="match-score">${match.score || "-"}</span>
                <span class="match-status ${statusClass}">${match.status}</span>
              </div>
            </div>
            <div class="stats-table">${statsHtml}</div>
          </div>
        `;
      }).join("");
    }

    // ---- Actions ----

    function showAddMatch() {
      const section = document.getElementById("addMatchSection");
      section.style.display = section.style.display === "none" ? "block" : "none";
    }

    async function scrapeAll() {
      const btn = document.getElementById("btnScrape");
      btn.classList.add("loading");
      btn.disabled = true;

      try {
        const res = await fetch("/api/scrape", { method: "POST" });
        const data = await res.json();
        if (data.success) {
          showToast(`${data.matchCount} wedstrijden opgehaald!`, "success");
          await fetchStats();
        } else {
          showToast(`Fout: ${data.error}`, "error");
        }
      } catch (e) {
        showToast(`Fout: ${e.message}`, "error");
      } finally {
        btn.classList.remove("loading");
        btn.disabled = false;
      }
    }

    async function scrapeMatch() {
      const input = document.getElementById("matchUrlInput");
      const url = input.value.trim();
      if (!url) return;

      const btn = document.getElementById("btnAddMatch");
      btn.classList.add("loading");
      btn.disabled = true;

      try {
        const res = await fetch("/api/scrape-match", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        if (data.success) {
          showToast("Wedstrijd opgehaald!", "success");
          input.value = "";
          await fetchStats();
        } else {
          showToast(`Fout: ${data.error}`, "error");
        }
      } catch (e) {
        showToast(`Fout: ${e.message}`, "error");
      } finally {
        btn.classList.remove("loading");
        btn.disabled = false;
      }
    }

    function showToast(message, type = "success") {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => {
        toast.classList.remove("show");
      }, 3000);
    }

    // Enter key in URL input
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && document.activeElement?.id === "matchUrlInput") {
        scrapeMatch();
      }
    });
  </script>

</body>
</html>
